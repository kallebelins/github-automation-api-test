name: PR CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore GithubAutomation.Api.sln

      - name: Build
        run: dotnet build GithubAutomation.Api.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test GithubAutomation.Api.sln --configuration Release --no-build --verbosity normal
